<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Any Guy Alumni Q&A 01</title>
  <style>
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: block; src: url('../assets/fonts/Inter-Regular.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: block; src: url('../assets/fonts/Inter-SemiBold.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 900; font-display: block; src: url('../assets/fonts/Inter-Black.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: block; src: url('../assets/fonts/JetBrainsMono-Regular.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: block; src: url('../assets/fonts/JetBrainsMono-Medium.woff2') format('woff2'); }

    :root {
      --bg: #000000;
      --ink: #FFFFFF;
      --ink-muted: #A8A8A8;
      --gold: #D8B125;
      --gold-dim: #7A6428;
      --frame-line: rgba(216, 177, 37, 0.22);
      --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-condensed: Impact, 'Arial Narrow', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, .canvas { width: 1080px; height: 1080px; overflow: hidden; background: var(--bg); }
    .canvas { position: relative; color: var(--ink); }
    .bg-layer { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.45; z-index: 0; }
    .header { position: absolute; left: 56px; top: 48px; right: 78px; display: flex; align-items: center; gap: 34px; z-index: 3; }
    .avatar { width: 128px; height: 128px; border: 6px solid var(--gold); border-radius: 50%; background: #030303; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
    .avatar-inner { width: 70px; height: 70px; border: 4px solid var(--gold); border-radius: 50%; position: relative; opacity: 0.85; }
    .avatar-inner::after { content: ''; position: absolute; left: 50%; top: 64px; width: 96px; height: 48px; transform: translateX(-50%); border: 4px solid var(--gold); border-bottom: 0; border-radius: 60px 60px 0 0; }
    .name { font-family: var(--font-condensed); font-size: 86px; line-height: 0.95; letter-spacing: 0.10em; color: var(--ink); text-transform: uppercase; white-space: nowrap; }
    .role { font-family: var(--font-mono); font-size: 27px; line-height: 1.25; letter-spacing: 0.12em; color: var(--gold); margin-top: 10px; text-transform: uppercase; }
    .photo-note { font-family: var(--font-mono); font-size: 17px; line-height: 1.25; letter-spacing: 0.08em; color: var(--ink-muted); margin-top: 8px; }
    .qno { position: absolute; left: 64px; top: 336px; font-family: var(--font-sans); font-size: 108px; line-height: 1; font-weight: 900; color: var(--gold-dim); opacity: 0.78; letter-spacing: -0.04em; }
    .qblock { position: absolute; left: 216px; top: 336px; right: 82px; z-index: 2; }
    .question { font-family: var(--font-condensed); font-size: 44px; line-height: 1.16; letter-spacing: 0.10em; color: var(--gold); text-transform: uppercase; }
    .rule { position: absolute; left: 136px; right: 0; top: 560px; height: 1px; background: var(--frame-line); z-index: 1; }
    .answer { position: absolute; left: 216px; top: 486px; right: 128px; font-family: var(--font-sans); font-size: 42px; line-height: 1.34; font-weight: 400; color: var(--ink); letter-spacing: 0.02em; z-index: 2; }
    .answer strong { font-weight: 600; color: var(--ink); }
    .logo-row { position: absolute; left: 216px; bottom: 70px; display: flex; align-items: center; gap: 34px; z-index: 3; }
    .logo-row img { height: 42px; max-width: 160px; object-fit: contain; display: block; }
    .watai-logo { position: absolute; right: 56px; bottom: 48px; height: 56px; max-width: 220px; object-fit: contain; z-index: 3; }
  </style>
</head>
<body>
  <div class="canvas" data-motif="constellation" data-layout="alumni-qa">
    <svg class="bg-layer" id="bg" xmlns="http://www.w3.org/2000/svg"></svg>
    <header class="header">
      <div class="avatar" aria-label="Photo placeholder">
        <div class="avatar-inner"></div>
      </div>
      <div>
        <div class="name">ANY GUY</div>
        <div class="role">YC ALUM · NVIDIA</div>
        <div class="photo-note">PHOTO TBD</div>
      </div>
    </header>
    <div class="qno">01</div>
    <div class="qblock">
      <div class="question">WHAT CHANGED AFTER<br>WAT.AI?</div>
    </div>
    <div class="rule"></div>
    <div class="answer">
      <p>
        WAT.ai made building feel less like a class assignment and more like a
        real team sport. The biggest shift was learning to move from
        <strong>interesting models</strong> to systems people can actually use,
        explain, and improve.
      </p>
    </div>
    <div class="logo-row" aria-label="Alumni affiliations">
      <img src="../assets/logos/y-combinator.svg" alt="Y Combinator">
      <img src="../assets/logos/nvidia.svg" alt="NVIDIA">
    </div>
    <img class="watai-logo" src="../assets/logo.svg" alt="WAT.ai">
  </div>
  <script>
    (function () {
      const svg = document.getElementById('bg');
      const W = 1080, H = 1080;
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      let seed = 0xc0ffee02;
      function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return ((seed >>> 0) / 0xffffffff); }
      function rr(a, b) { return a + rand() * (b - a); }
      const pts = [];
      for (let i = 0; i < 18; i++) pts.push([W * rr(-0.04, 0.20), H * rr(-0.02, 0.28)]);
      for (let i = 0; i < 26; i++) pts.push([W * rr(0.70, 1.04), H * rr(0.76, 1.04)]);
      for (let i = 0; i < 8; i++) pts.push([W * rr(0.42, 0.95), H * rr(0.02, 0.16)]);
      let lines = '';
      for (let i = 0; i < pts.length; i++) {
        const sorted = pts.map((p, j) => [Math.hypot(pts[i][0] - p[0], pts[i][1] - p[1]), j]).filter(([, j]) => j !== i).sort(([a], [b]) => a - b);
        for (let k = 0; k < 2; k++) {
          const j = sorted[k][1];
          lines += `<line x1="${pts[i][0].toFixed(1)}" y1="${pts[i][1].toFixed(1)}" x2="${pts[j][0].toFixed(1)}" y2="${pts[j][1].toFixed(1)}" stroke="#D8B125" stroke-width="1" opacity="0.24"/>`;
        }
      }
      let dots = '';
      for (const [x, y] of pts) dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rr(1, 2.4).toFixed(1)}" fill="#D8B125" opacity="${rr(0.30, 0.68).toFixed(2)}"/>`;
      svg.innerHTML = lines + dots;
    })();
  </script>
</body>
</html>
