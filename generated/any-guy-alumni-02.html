<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Any Guy Alumni 02</title>
  <style>
    @font-face { font-family: 'DM Serif Display'; font-style: normal; font-weight: 400; font-display: block; src: url('../assets/fonts/DMSerifDisplay-Regular.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 900; font-display: block; src: url('../assets/fonts/Inter-Black.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: block; src: url('../assets/fonts/JetBrainsMono-Regular.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: block; src: url('../assets/fonts/JetBrainsMono-Medium.woff2') format('woff2'); }
    :root { --bg: #000000; --ink: #FFFFFF; --ink-muted: #A8A8A8; --gold: #D8B125; --gold-dim: #7A6428; --font-display: 'DM Serif Display', Georgia, serif; --font-sans: 'Inter', Arial, sans-serif; --font-mono: 'JetBrains Mono', monospace; --pad: 64px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, .canvas { width: 1080px; height: 1080px; overflow: hidden; background: var(--bg); }
    .canvas { position: relative; }
    .bg-layer { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .watermark { position: absolute; left: -30px; right: -30px; font-family: var(--font-display); font-size: 215px; line-height: 0.9; -webkit-text-stroke: 1px var(--ink); color: transparent; opacity: 0.11; text-align: center; white-space: nowrap; z-index: 1; }
    .watermark-top { top: 12px; }
    .watermark-bottom { bottom: 84px; }
    .meta { position: absolute; padding: var(--pad); font-family: var(--font-mono); z-index: 3; display: flex; flex-direction: column; gap: 8px; }
    .meta-tl { top: 0; left: 0; }
    .meta-tr { top: 0; right: 0; text-align: right; align-items: flex-end; }
    .label-lg { font-size: 30px; line-height: 1.3; }
    .label-md { font-size: 24px; line-height: 1.35; }
    .label-sm { font-size: 18px; line-height: 1.35; letter-spacing: 0.08em; }
    .gold { color: var(--gold); }
    .muted { color: var(--ink-muted); }
    .hero { position: absolute; top: 310px; left: var(--pad); right: var(--pad); text-align: center; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 30px; }
    .name { font-family: var(--font-sans); font-size: 142px; line-height: 0.92; color: var(--ink); font-weight: 900; letter-spacing: 0; }
    .line { font-family: var(--font-mono); font-size: 32px; line-height: 1.35; color: var(--gold); }
    .detail { font-family: var(--font-mono); font-size: 24px; line-height: 1.45; color: var(--ink-muted); max-width: 760px; }
    .bottom-brand-bar { position: absolute; left: var(--pad); right: var(--pad); bottom: var(--pad); display: flex; align-items: center; justify-content: space-between; gap: 32px; z-index: 4; }
    .partner-logos { display: flex; align-items: center; gap: 30px; min-height: 48px; }
    .partner-logo { display: block; height: 44px; max-width: 172px; object-fit: contain; }
    .watai-logo { display: block; height: 48px; max-width: 220px; width: auto; object-fit: contain; }
  </style>
</head>
<body>
  <div class="canvas">
    <svg class="bg-layer" id="bg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="watermark watermark-top">ALUMNI</div>
    <div class="watermark watermark-bottom">ALUMNI</div>
    <div class="meta meta-tl">
      <span class="label-lg gold">• ANY GUY</span>
      <span class="label-md muted">ALUMNI SPOTLIGHT</span>
    </div>
    <div class="meta meta-tr">
      <span class="label-md muted">YC · NVIDIA</span>
      <span class="label-sm muted">POST_GRAD_02</span>
    </div>
    <main class="hero">
      <h1 class="name">ANY GUY</h1>
      <div class="line">→ YC + NVIDIA</div>
      <p class="detail">From WAT.ai to company-building and GPU-scale systems.</p>
    </main>
    <div class="bottom-brand-bar">
      <div class="partner-logos" aria-label="Alumni affiliations">
        <img class="partner-logo" src="../assets/logos/y-combinator.svg" alt="Y Combinator">
        <img class="partner-logo" src="../assets/logos/nvidia.svg" alt="NVIDIA">
      </div>
      <img class="watai-logo" src="../assets/logo.svg" alt="WAT.ai">
    </div>
  </div>
  <script>
    (function () {
      const svg = document.getElementById('bg');
      const W = 1080, H = 1080;
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      let seed = 0xbee02;
      function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return ((seed >>> 0) / 0xffffffff); }
      function rr(a, b) { return a + rand() * (b - a); }
      const pts = [];
      for (let i = 0; i < 34; i++) pts.push([W * (0.14 + rand() * 0.72), H * (0.16 + rand() * 0.50)]);
      for (let i = 0; i < 18; i++) pts.push([W * (0.58 + rand() * 0.34), H * (0.52 + rand() * 0.30)]);
      let lines = '';
      for (let i = 0; i < pts.length; i++) {
        const sorted = pts.map((p, j) => [Math.hypot(pts[i][0] - p[0], pts[i][1] - p[1]), j]).filter(([, j]) => j !== i).sort(([a], [b]) => a - b);
        for (let k = 0; k < 2; k++) {
          const j = sorted[k][1];
          lines += `<line x1="${pts[i][0].toFixed(1)}" y1="${pts[i][1].toFixed(1)}" x2="${pts[j][0].toFixed(1)}" y2="${pts[j][1].toFixed(1)}" stroke="#D8B125" stroke-width="1" opacity="0.20"/>`;
        }
      }
      let dots = '';
      for (const [x, y] of pts) dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rr(1.4, 3.8).toFixed(1)}" fill="#D8B125" opacity="${rr(0.32, 0.76).toFixed(2)}"/>`;
      svg.innerHTML = lines + dots;
    })();
  </script>
</body>
</html>
