<!DOCTYPE html>
<!--
  WAT.ai Instagram Post Template — 1080×1080
  ─────────────────────────────────────────────────────────────────────────────
  HOW TO USE:
    1. Copy this file to generated/<slug>.html — never edit in place.
    2. Set data-motif on .canvas:
         particle      → workshops, events, learning (background A)
         grid          → applications, deadlines, CTAs (background B)
         constellation → alumni, spotlight, community (background C)
    3. Fill the four corner slots and the hero zone (see comments).
    4. Remove unused optional elements (watermark, accent-bar, pill).
    5. Update the logo img src to "../../assets/logo.svg" → "../assets/logo.svg"
       if the generated file lives in generated/.
    6. Render: ./render.sh generated/<slug>.html

  CONSTRAINTS (from tokens.md / motifs.md — do not violate):
    • Colors: --bg #0A0A0A  --ink #FFFFFF  --ink-muted #A8A8A8
              --gold #E8B844  --gold-dim #7A6428  --grid-line #1A1A1A
    • Fonts: DM Serif Display (outlined hero), Inter 900 (solid hero), JetBrains Mono (all metadata)
    • Marks: • › → · [ ] _   Nothing else.
    • No drop shadows, gradients, rounded corners (except .pill), photographs.
    • Gold ≤ ~10% of visible color.
    • Three type voices max: one hero + monospace metadata + monospace detail.
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>WAT.ai Post</title>
  <style>
    /* ── Local fonts ─────────────────────────────────────────────────────── */
    /* Paths below are relative to skills/instagram-post/.                   */
    /* When copying to generated/, change ../../assets/ → ../assets/         */
    @font-face {
      font-family: 'DM Serif Display';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('../../assets/fonts/DMSerifDisplay-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('../../assets/fonts/Inter-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 600;
      font-display: block;
      src: url('../../assets/fonts/Inter-SemiBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 900;
      font-display: block;
      src: url('../../assets/fonts/Inter-Black.woff2') format('woff2');
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('../../assets/fonts/JetBrainsMono-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 500;
      font-display: block;
      src: url('../../assets/fonts/JetBrainsMono-Medium.woff2') format('woff2');
    }

    /* ── Token layer ─────────────────────────────────────────────────────── */
    :root {
      --bg:        #000000;
      --ink:       #FFFFFF;
      --ink-muted: #A8A8A8;
      --gold:      #D8B125;
      --gold-dim:  #7A6428;
      --grid-line: #1A1A1A;

      --font-display: 'DM Serif Display', Georgia, serif;
      --font-sans:    'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;

      /* Type scale — 1080×1080 canvas reference values */
      --display-xl:  220px;   /* outlined serif hero — single short word          */
      --display-lg:  150px;   /* outlined serif hero — two words or longer phrase  */
      --heading-xl:  100px;   /* solid sans — name ALL CAPS                        */
      --heading-lg:   72px;   /* solid sans — announcement Title Case              */
      --label-lg:     22px;   /* primary monospace metadata                        */
      --label-md:     18px;   /* secondary monospace metadata                      */
      --label-sm:     14px;   /* corner markers, footer wordmark                   */

      --pad: 60px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Canvas ──────────────────────────────────────────────────────────── */
    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Background layer (drawn by JS) ──────────────────────────────────── */
    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Optional: watermark layer ───────────────────────────────────────── */
    /* Repeat the hero word at very top / bottom, ~12% opacity, outlined serif */
    /* Use when canvas feels empty without it. At most two lines (top + bottom). */
    .watermark {
      position: absolute;
      left: 0;
      right: 0;
      font-family: var(--font-display);
      -webkit-text-stroke: 1px var(--ink);
      color: transparent;
      opacity: 0.12;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .watermark-top    { top: -10px;    font-size: 200px; }
    .watermark-bottom { bottom: -10px; font-size: 200px; }

    /* ── Optional: gold accent bar (alumni / spotlight only) ─────────────── */
    .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 7px;
      background: var(--gold);
      z-index: 2;
    }

    /* ── Corner metadata ─────────────────────────────────────────────────── */
    .meta {
      position: absolute;
      padding: var(--pad);
      font-family: var(--font-mono);
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .meta-tl { top: 0; left: 0; }
    .meta-tr { top: 0; right: 0; text-align: right; align-items: flex-end; }
    .meta-bl { bottom: 0; left: 0; }
    .meta-br { bottom: 0; right: 0; align-items: flex-end; }

    /* ── Hero zone ───────────────────────────────────────────────────────── */
    /* Center of canvas. Shift vertically with margin-top if needed. */
    .hero {
      position: absolute;
      top: 50%;
      left: var(--pad);
      right: var(--pad);
      transform: translateY(-50%);
      text-align: center;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Type: outlined display serif ────────────────────────────────────── */
    /* For abstract/conceptual titles. Size down from --display-xl if the word */
    /* is long — target max ~960px wide (canvas 1080 minus 2×60px padding).    */
    .display-outlined {
      font-family: var(--font-display);
      font-size: var(--display-xl);
      line-height: 0.95;
      -webkit-text-stroke: 2px var(--ink);
      color: transparent;
      display: block;
    }
    .display-outlined-lg {
      font-family: var(--font-display);
      font-size: var(--display-lg);
      line-height: 1;
      -webkit-text-stroke: 2px var(--ink);
      color: transparent;
      display: block;
    }

    /* ── Type: solid heavy sans ──────────────────────────────────────────── */
    /* For names (ALL CAPS) and announcements (Title Case).                   */
    /* Weight 900 = hero. Weight 600 = emphasis (secondary sans lines).       */
    .heading-solid-xl {
      font-family: var(--font-sans);
      font-weight: 900;
      font-size: var(--heading-xl);
      line-height: 1;
      color: var(--ink);
      display: block;
    }
    .heading-solid-lg {
      font-family: var(--font-sans);
      font-weight: 900;
      font-size: var(--heading-lg);
      line-height: 1.05;
      color: var(--ink);
      display: block;
    }
    .heading-emphasis {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: var(--heading-lg);
      line-height: 1.05;
      color: var(--ink);
      display: block;
    }

    /* ── Type: monospace labels ──────────────────────────────────────────── */
    .label-lg { font-size: var(--label-lg); line-height: 1.4; }
    .label-md { font-size: var(--label-md); line-height: 1.4; }
    .label-sm { font-size: var(--label-sm); line-height: 1.4; letter-spacing: 0.06em; }

    /* ── Color helpers ───────────────────────────────────────────────────── */
    .gold     { color: var(--gold); }
    .muted    { color: var(--ink-muted); }
    .gold-dim { color: var(--gold-dim); }

    /* ── Pill outline tag ────────────────────────────────────────────────── */
    /* At most ONE per graphic. A single pinpoint location/code.              */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid var(--gold);
      border-radius: 999px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: var(--label-md);
      color: var(--gold);
      letter-spacing: 0.06em;
    }

    /* ── Chevron list (bottom-left detail area) ──────────────────────────── */
    .chevron-list {
      list-style: none;
      font-family: var(--font-mono);
      font-size: var(--label-md);
      color: var(--ink-muted);
      line-height: 1.8;
    }
    .chevron-list li::before {
      content: '› ';
      color: var(--gold);
    }

    /* ── WAT.AI lockup ───────────────────────────────────────────────────── */
    .watai-lockup {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: var(--label-sm);
      color: var(--gold);
      letter-spacing: 0.08em;
    }
    .watai-lockup svg {
      height: 20px;
      width: auto;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!--
    ═══════════════════════════════════════════════════════════════════════════
    SET data-motif: particle | grid | constellation
    ═══════════════════════════════════════════════════════════════════════════
  -->
  <div class="canvas" data-motif="particle">

    <!-- Background SVG — drawn by the script at the bottom -->
    <svg class="bg-layer" id="bg" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- ── OPTIONAL: watermark ────────────────────────────────────────────
         Remove both divs if not needed.
         Repeat the hero word (same text) at top and bottom.
    ──────────────────────────────────────────────────────────────────────── -->
    <!-- <div class="watermark watermark-top">WORD</div> -->
    <!-- <div class="watermark watermark-bottom">WORD</div> -->

    <!-- ── OPTIONAL: gold accent bar (alumni / spotlight posts only) ─────── -->
    <!-- <div class="accent-bar"></div> -->

    <!-- ─────────────────────────────────────────────────────────────────────
         TOP-LEFT: primary gold metadata
         • What + when. Prefixed with •. One or two lines.
         Example: <span class="label-lg gold">• SPRING 26 · TUESDAYS 6–8 PM</span>
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="meta meta-tl">
      <!-- FILL IN -->
    </div>

    <!-- ─────────────────────────────────────────────────────────────────────
         TOP-RIGHT: system tag (muted, two stacked lines)
         Series marker + season. Less prominent than TL.
         Example:
           <span class="label-md muted">WORKSHOP · 01</span>
           <span class="label-sm muted">SPRING_26</span>
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="meta meta-tr">
      <!-- FILL IN -->
    </div>

    <!-- ─────────────────────────────────────────────────────────────────────
         BOTTOM-LEFT: supporting details or chevron list (may be empty)
         Example:
           <ul class="chevron-list">
             <li>Topic one</li>
             <li>Topic two</li>
           </ul>
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="meta meta-bl">
      <!-- FILL IN or remove -->
    </div>

    <!-- ─────────────────────────────────────────────────────────────────────
         BOTTOM-RIGHT: WAT.AI lockup — always present
         Update src path:
           from template: ../../assets/logo.svg
           from generated/: ../assets/logo.svg
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="meta meta-br">
      <div class="watai-lockup">
        <svg viewBox="0 0 341 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M94.9593 227.168C64.6403 214.841 41.9429 180.704 0 0L180 142C195.843 122.293 205.606 113.448 215.345 110.313C223.444 107.706 232.645 109.577 239.254 114.936C251.941 125.223 259.551 146.816 270 188L316 67.5L341 57L270 236.5L184 170C160.497 199.542 145.017 217.795 129.728 226.569C119.21 232.605 106.193 231.735 94.9593 227.168ZM252 200L195 154C204.455 139.785 210.426 132.171 218.982 129.188C222.095 128.102 225.525 129.102 227.821 131.468C238.147 142.113 243.831 159.786 252 200ZM29 47.5C60.1289 164.895 77.0513 199.796 100.289 211.27C105.808 213.995 112.301 214.594 118.011 212.296C131.148 207.007 144.411 192.003 168.5 158L29 47.5Z"/>
        </svg>
        <span>WAT.AI</span>
      </div>
    </div>

    <!-- ─────────────────────────────────────────────────────────────────────
         HERO ZONE — center of canvas
         Pick ONE hero type (never both):
           Concept/abstract → .display-outlined or .display-outlined-lg
           Person/announcement → .heading-solid-xl or .heading-solid-lg
         Add .pill below the title if there's a single location to highlight.
         For long words: reduce font-size inline so text stays within 960px width.
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="hero">

      <!-- HERO TITLE: remove the example and add real content -->
      <!-- <span class="display-outlined">Hero<br>Word</span> -->
      <!-- <span class="heading-solid-xl">PERSON NAME</span> -->

      <!-- OPTIONAL PILL (at most one) -->
      <!-- <span class="pill">• MC 2034</span> -->

    </div>

  </div><!-- /.canvas -->

  <script>
    // ── Background generator ──────────────────────────────────────────────
    // Reads data-motif from .canvas and draws the appropriate SVG background.
    // Values: particle | grid | constellation
    // ─────────────────────────────────────────────────────────────────────
    (function () {
      const canvas = document.querySelector('.canvas');
      const svg    = document.getElementById('bg');
      const motif  = (canvas.dataset.motif || 'particle').trim();
      const W = 1080, H = 1080;

      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

      // Seeded PRNG for reproducible output across renders
      let seed = 0xdeadbeef;
      function rand() {
        seed ^= seed << 13;
        seed ^= seed >> 17;
        seed ^= seed << 5;
        return ((seed >>> 0) / 0xffffffff);
      }
      function rr(a, b) { return a + rand() * (b - a); }

      // ── A. Particle / dust scatter ──────────────────────────────────────
      // Signals: events, workshops, learning. Dense in one quadrant, sparse
      // in the opposite. Looks like deep space or scattered chalk dust.
      if (motif === 'particle') {
        let h = '';
        // Main scatter — weighted toward upper-right quadrant
        for (let i = 0; i < 320; i++) {
          const u = rand(), v = rand();
          const x = (W * 0.25) + u * (W * 0.75);
          const y = v * H;
          const r  = rr(0.5, 2.2);
          const op = rr(0.07, 0.5);
          h += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="#fff" opacity="${op.toFixed(2)}"/>`;
        }
        // Larger dust specks — sparse
        for (let i = 0; i < 40; i++) {
          const x = (W * 0.3) + rand() * (W * 0.7);
          const y = rand() * H;
          const r  = rr(1.5, 3.5);
          const op = rr(0.04, 0.18);
          h += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="#fff" opacity="${op.toFixed(2)}"/>`;
        }
        svg.innerHTML = h;

      // ── B. Grid / mesh ──────────────────────────────────────────────────
      // Signals: applications, deadlines, anything procedural. Thin lines at
      // ~40px spacing, slight perspective warp outward from center.
      } else if (motif === 'grid') {
        const sp = 40;
        let h = `<g stroke="#1A1A1A" stroke-width="1" fill="none">`;
        for (let x = 0; x <= W; x += sp) {
          const bend = (x - W / 2) * 0.035;
          h += `<path d="M${x},0 Q${x + bend},${H / 2} ${x},${H}"/>`;
        }
        for (let y = 0; y <= H; y += sp) {
          const bend = (y - H / 2) * 0.035;
          h += `<path d="M0,${y} Q${W / 2},${y + bend} ${W},${y}"/>`;
        }
        h += `</g>`;
        svg.innerHTML = h;

      // ── C. Constellation / network graph ────────────────────────────────
      // Signals: people, alumni, community, research. Sparse dots connected
      // to their 2 nearest neighbors, denser in the upper-right by default.
      } else if (motif === 'constellation') {
        const pts = [];
        // Upper-right cluster (denser)
        for (let i = 0; i < 34; i++) {
          pts.push([W * (0.35 + rand() * 0.65), H * (0.05 + rand() * 0.50)]);
        }
        // Lower-left scatter (sparse)
        for (let i = 0; i < 14; i++) {
          pts.push([W * rand() * 0.55, H * (0.45 + rand() * 0.55)]);
        }

        let lines = '';
        for (let i = 0; i < pts.length; i++) {
          const sorted = pts
            .map((p, j) => {
              const dx = pts[i][0] - p[0], dy = pts[i][1] - p[1];
              return [Math.sqrt(dx * dx + dy * dy), j];
            })
            .filter(([, j]) => j !== i)
            .sort(([a], [b]) => a - b);

          for (let k = 0; k < 2; k++) {
            const j = sorted[k][1];
            lines += `<line x1="${pts[i][0].toFixed(1)}" y1="${pts[i][1].toFixed(1)}" x2="${pts[j][0].toFixed(1)}" y2="${pts[j][1].toFixed(1)}" stroke="#A8A8A8" stroke-width="1" opacity="0.28"/>`;
          }
        }
        let dots = '';
        for (const [x, y] of pts) {
          dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rr(1, 2.2).toFixed(1)}" fill="#A8A8A8" opacity="${rr(0.3, 0.65).toFixed(2)}"/>`;
        }
        svg.innerHTML = lines + dots;
      }
    })();
  </script>

</body>
</html>
